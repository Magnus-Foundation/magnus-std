name: Update interfaces from Tempo

on:
  schedule:
    # Nightly at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0
        with:
          version: nightly

      - name: Run sync
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/sync.sh
          scripts/sync.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: interface update"
          title: "chore: interface update"
          body: |
            Automated nightly sync via `scripts/sync.sh`.

            - Trigger: scheduled workflow
            - Notes: PR is only created when there are file changes.
          branch: chore/nightly-sync
          delete-branch: true
